spring:
  flyway:
    enabled: false
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql
      continue-on-error: true

mybatis-plus:
  global-config:
    db-config:
      id-type: auto

logging:
  level:
    com.marketing.task: DEBUG

app:
  auth:
    mock-enabled: true
