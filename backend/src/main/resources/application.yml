spring:
  application:
    name: marketing-task-platform
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
server:
  port: 8080

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id

app:
  auth:
    mock-enabled: ${APP_AUTH_MOCK:false}
    admin:
      secret: ${ADMIN_JWT_SECRET:}
      expiry-minutes: 120
    client:
      secret: ${CLIENT_JWT_SECRET:}
      expiry-minutes: 120

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
